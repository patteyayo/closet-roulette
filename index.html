<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Closet Roulette - Full App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        h1, h2, h3, .fashion-font { font-family: 'Playfair Display', serif; }
        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }
        .animate-pulse-gold { animation: pulse-gold 2s infinite; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .card-perspective { perspective: 1000px; width: 100%; position: relative; z-index: 1; }
        .card-perspective.is-active { z-index: 50; }
        .aspect-ratio-portrait { padding-top: 145%; }
        .card-inner {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .card-inner.is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            -webkit-backface-visibility: hidden; backface-visibility: hidden;
            top: 0; left: 0;
        }
        .card-back {
            transform: rotateY(180deg);
            background-color: white; border: 1px solid black;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; padding: 1rem; text-align: center;
        }
        .delete-btn { 
          position: absolute; top: 8px; right: 8px; z-index: 999; 
          background: rgba(0, 0, 0, 0.6); 
          -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
          border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 50%; padding: 8px; 
          cursor: pointer; color: white; transition: all 0.3s;
        }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom/client": "https://esm.sh/react-dom@^19.2.4/client"
      }
    }
    </script>
</head>
<body class="bg-white text-black antialiased">
    <div id="root"></div>
    <script type="module">
        import React from 'react';
        import ReactDOM from 'react-dom/client';

        const h = React.createElement;
        // Corrected URL to match your provided Google Script Link
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbxnbGt4_GZ7ndLcMugUUBFm9VUrAicUXMGk01joGVAM1EbjxBgUjSccmTPIdwY6WsVk/exec';

        const formatDriveUrl = (url) => {
            if (!url || !url.includes('drive.google.com')) return url;
            const idMatch = url.match(/(?:id=|\/d\/)([a-zA-Z0-9_-]+)/);
            if (idMatch && idMatch[1]) return 'https://googleusercontent.com/profile/picture/0' + idMatch[1];
            return url;
        };

        const NavButton = ({ active, onClick, label }) => 
            h('button', { onClick, className: 'uppercase text-[10px] tracking-widest px-4 py-2 transition-all ' + (active ? 'font-bold underline underline-offset-4' : 'opacity-40 hover:opacity-100') }, label);

        const Layout = ({ children, currentView, onViewChange, genderPreference, onGenderToggle }) => 
            h('div', { className: 'min-h-screen flex flex-col max-w-md mx-auto relative overflow-hidden bg-white' }, [
                h('header', { className: 'py-6 px-4 border-b border-black flex justify-between items-center sticky top-0 bg-white z-20' }, [
                    h('div', { className: 'flex flex-col' }, [
                        h('button', { onClick: () => onViewChange('home'), className: 'fashion-font text-2xl font-bold uppercase tracking-tighter' }, 'Closet Roulette'),
                        h('button', { onClick: onGenderToggle, className: 'text-[8px] uppercase tracking-[0.2em] font-bold text-left opacity-60' }, 'Styling For: ' + genderPreference)
                    ]),
                    h('button', { 
                        onClick: () => onViewChange('gallery'),
                        className: 'text-xs uppercase tracking-widest border border-black px-3 py-1'
                    }, 'Vault')
                ]),
                h('main', { className: 'flex-1 overflow-y-auto pb-24' }, children),
                h('nav', { className: 'fixed bottom-0 left-0 right-0 max-w-md mx-auto border-t border-black bg-white flex justify-around items-center py-4 px-2 z-30' }, [
                    h(NavButton, { active: currentView === 'home', onClick: () => onViewChange('home'), label: 'Home' }),
                    h(NavButton, { active: currentView === 'scan', onClick: () => onViewChange('scan'), label: 'Scan' }),
                    h(NavButton, { active: currentView === 'roulette', onClick: () => onViewChange('roulette'), label: 'Spin' }),
                    h(NavButton, { active: currentView === 'judge', onClick: () => onViewChange('judge'), label: 'Judge' }),
                    h(NavButton, { active: currentView === 'gallery', onClick: () => onViewChange('gallery'), label: 'Items' })
                ])
            ]);

        const Scanner = ({ onUploadSuccess }) => {
            const [status, setStatus] = React.useState('Ready');
            const handleUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setStatus('Uploading...');
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const base64 = event.target.result.split(',')[1];
                    // Calling your script to save the item
                    google.script.run.withSuccessHandler(() => {
                        setStatus('Saved!');
                        onUploadSuccess();
                    }).processImage(base64); 
                };
                reader.readAsDataURL(file);
            };
            return h('div', { className: 'p-12 text-center space-y-6' }, [
                h('h2', { className: 'fashion-font text-3xl italic' }, 'Artifact Scanner'),
                h('div', { className: 'border-2 border-dashed border-black p-12 bg-neutral-50 flex flex-col items-center' }, [
                    h('p', { className: 'text-[10px] uppercase mb-4 opacity-50' }, status),
                    h('input', { type: 'file', accept: 'image/*', capture: 'environment', id: 'cam', className: 'hidden', onChange: handleUpload }),
                    h('label', { htmlFor: 'cam', className: 'bg-black text-white px-8 py-4 uppercase text-[10px] tracking-widest cursor-pointer shadow-lg' }, 'Open Camera')
                ])
            ]);
        };

        const App = () => {
            const [view, setView] = React.useState('home');
            const [wardrobe, setWardrobe] = React.useState([]);
            const [gender, setGender] = React.useState('Women');

            const load = async () => {
                const r = await fetch(scriptUrl);
                const d = await r.json();
                setWardrobe(d || []);
            };

            React.useEffect(() => { load(); }, []);

            const deleteItem = (id) => {
                if (!confirm('Remove item?')) return;
                // Internal Apps Script call is safer than fetch for deletions
                google.script.run.withSuccessHandler(load).deleteItem(id);
            };

            return h(Layout, { currentView: view, onViewChange: setView, genderPreference: gender, onGenderToggle: () => setGender(p => p === 'Men' ? 'Women' : 'Men') }, [
                view === 'home' && h('div', { className: 'p-12 text-center space-y-8' }, [
                    h('h2', { className: 'fashion-font text-5xl italic leading-tight' }, 'The Vault'),
                    h('button', { onClick: () => setView('scan'), className: 'w-full bg-black text-white py-5 uppercase text-xs tracking-[0.5em]' }, 'Scan New Item')
                ]),
                view === 'scan' && h(Scanner, { onUploadSuccess: () => setView('gallery') }),
                // ... Additional components like Gallery and Roulette would go here
            ]);
        };

        ReactDOM.createRoot(document.getElementById('root')).render(h(App));
    </script>
</body>
</html>
